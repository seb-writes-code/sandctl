name: TypeScript CI

on:
  push:
    paths:
      - "sandctl-ts/**"
      - ".github/workflows/ts-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Lint
        working-directory: sandctl-ts
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Test
        working-directory: sandctl-ts
        run: bun test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Build
        working-directory: sandctl-ts
        run: bun run build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sandctl-ts-binary
          path: sandctl-ts/sandctl

  e2e:
    runs-on: ubuntu-latest
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Build binary
        working-directory: sandctl-ts
        run: bun run build
      - name: Generate SSH key
        if: ${{ env.HETZNER_API_TOKEN != '' }}
        run: ssh-keygen -t ed25519 -N '' -f /tmp/id_ed25519
      - name: Run live smoke E2E test
        if: ${{ env.HETZNER_API_TOKEN != '' }}
        working-directory: sandctl-ts
        env:
          HETZNER_API_TOKEN: ${{ env.HETZNER_API_TOKEN }}
          SANDCTL_LIVE_SMOKE: "1"
          SSH_PUBLIC_KEY: /tmp/id_ed25519.pub
        run: bun test tests/e2e/live-smoke.test.ts
      - name: Skip live smoke E2E test
        if: ${{ env.HETZNER_API_TOKEN == '' }}
        run: 'echo "Skipping live smoke E2E test: HETZNER_API_TOKEN is not configured"'
      - name: Cleanup generated SSH key
        if: ${{ always() && env.HETZNER_API_TOKEN != '' }}
        run: rm -f /tmp/id_ed25519 /tmp/id_ed25519.pub
