name: TypeScript CI

on:
  push:
    branches:
      - main
    paths:
      - "sandctl-ts/**"
      - ".github/workflows/ts-ci.yml"
  pull_request:
    paths:
      - "sandctl-ts/**"
      - ".github/workflows/ts-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Lint
        working-directory: sandctl-ts
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Test
        working-directory: sandctl-ts
        run: bun test tests/unit/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Build
        working-directory: sandctl-ts
        run: bun run build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sandctl-ts-binary
          path: sandctl-ts/sandctl

  contract-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: sandctl-ts-binary
          path: sandctl-ts
      - name: Make binary executable
        run: chmod +x sandctl-ts/sandctl
      - name: Run contract tests
        working-directory: sandctl-ts
        run: bun run test:e2e:contracts:ci

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
    steps:
      - name: Validate live smoke prerequisites
        run: |
          if [ -z "$HETZNER_API_TOKEN" ]; then
            echo "HETZNER_API_TOKEN is required for the live smoke E2E check."
            if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
              echo "Fork PRs are unsupported for this required check because repository secrets are unavailable."
            fi
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: sandctl-ts
        run: bun install
      - name: Build binary
        working-directory: sandctl-ts
        run: bun run build
      - name: Generate SSH key
        run: ssh-keygen -t ed25519 -N '' -f /tmp/id_ed25519
      - name: Run live smoke E2E test
        working-directory: sandctl-ts
        env:
          HETZNER_API_TOKEN: ${{ env.HETZNER_API_TOKEN }}
          SANDCTL_LIVE_SMOKE: "1"
          SSH_PUBLIC_KEY: /tmp/id_ed25519.pub
        shell: bash
        run: bun test tests/e2e/live-smoke.test.ts 2>&1 | tee /tmp/e2e-live-smoke.log; exit ${PIPESTATUS[0]}
      - name: Upload e2e test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-live-smoke-logs
          path: /tmp/e2e-live-smoke.log
          retention-days: 7
      - name: Cleanup generated SSH key
        if: ${{ always() }}
        run: rm -f /tmp/id_ed25519 /tmp/id_ed25519.pub
