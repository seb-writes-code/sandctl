name: TypeScript CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
      - "tsconfig.json"
      - "biome.json"
      - "bunfig.toml"
      - "scripts/**"
      - ".github/workflows/ts-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
      - "tsconfig.json"
      - "biome.json"
      - "bunfig.toml"
      - "scripts/**"
      - ".github/workflows/ts-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test
        run: bun test tests/unit/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sandctl-ts-binary
          path: sandctl

  contract-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: sandctl-ts-binary
          path: .
      - name: Make binary executable
        run: chmod +x sandctl
      - name: Run contract tests
        run: bun run test:e2e:contracts:ci

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
    steps:
      - name: Check secrets availability
        id: secrets-check
        run: |
          if [ -z "$HETZNER_API_TOKEN" ]; then
            echo "::notice::HETZNER_API_TOKEN is not available. Skipping e2e tests (expected for fork PRs)."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.secrets-check.outputs.has_token == 'true'
      - uses: oven-sh/setup-bun@v2
        if: steps.secrets-check.outputs.has_token == 'true'
      - name: Install dependencies
        if: steps.secrets-check.outputs.has_token == 'true'
        run: bun install
      - name: Build binary
        if: steps.secrets-check.outputs.has_token == 'true'
        run: bun run build
      - name: Generate SSH key
        if: steps.secrets-check.outputs.has_token == 'true'
        run: ssh-keygen -t ed25519 -N '' -f /tmp/id_ed25519
      - name: Run live smoke E2E test
        if: steps.secrets-check.outputs.has_token == 'true'
        env:
          HETZNER_API_TOKEN: ${{ env.HETZNER_API_TOKEN }}
          SANDCTL_LIVE_SMOKE: "1"
          SSH_PUBLIC_KEY: /tmp/id_ed25519.pub
        shell: bash
        run: bun test tests/e2e/live-smoke.test.ts 2>&1 | tee /tmp/e2e-live-smoke.log; exit ${PIPESTATUS[0]}
      - name: Upload e2e test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-live-smoke-logs
          path: /tmp/e2e-live-smoke.log
          retention-days: 7
      - name: Cleanup generated SSH key
        if: steps.secrets-check.outputs.has_token == 'true' && always()
        run: rm -f /tmp/id_ed25519 /tmp/id_ed25519.pub
